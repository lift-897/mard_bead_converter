<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mard 拼豆图案生成器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:#f0f2f5; min-height:100vh; }
.topbar {
  position:sticky; top:0; z-index:100; background:#fff; border-bottom:1px solid #e0e0e0;
  padding:10px 20px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.topbar h1 { font-size:20px; font-weight:800; color:#1a1a2e; display:flex; align-items:center; gap:8px; }
.topbar h1 .badge { font-size:12px; background:#6366f1; color:#fff; padding:2px 8px; border-radius:10px; font-weight:600; }
.topbar .controls { display:flex; gap:12px; align-items:center; }
.topbar .controls label { font-size:13px; font-weight:600; color:#475569; white-space:nowrap; }
.topbar select { padding:6px 12px; border:1px solid #d0d0d0; border-radius:6px; font-size:13px; }
.topbar .board-dims { display:flex; align-items:center; gap:4px; font-size:13px; font-weight:600; color:#334155; }
.topbar .board-dims input {
  width:44px; padding:5px 4px; border:1px solid #d0d0d0; border-radius:6px; font-size:13px; text-align:center;
}
.topbar .board-dims .sep { color:#94a3b8; }

.btn-diy {
  padding:7px 18px; background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; border:none;
  border-radius:20px; font-size:14px; font-weight:700; cursor:pointer; transition:all .15s;
  margin-left:10px; white-space:nowrap; box-shadow:0 2px 8px rgba(239,68,68,.25);
}
.btn-diy:hover { transform:scale(1.04); box-shadow:0 4px 14px rgba(239,68,68,.35); }
.btn-diy.active { background:linear-gradient(135deg,#6366f1,#8b5cf6); }

.btn-converter {
  padding:7px 18px; background:#6366f1; color:#fff; border:none;
  border-radius:20px; font-size:14px; font-weight:700; cursor:pointer; transition:all .15s;
  white-space:nowrap; margin-left:10px; display:none;
}
.btn-converter.visible { display:inline-block; }
.btn-converter:hover { background:#4f46e5; }

.main-layout { display:flex; height:calc(100vh - 56px); }

.left-panel {
  width:460px; min-width:460px; background:#fff; border-right:1px solid #e0e0e0;
  display:flex; flex-direction:column; padding:20px; overflow-y:auto; gap:16px;
}
.upload-zone {
  border:2px dashed #d0d0d0; border-radius:12px; padding:30px 20px; text-align:center;
  cursor:pointer; transition:all .15s; background:#fafafa;
}
.upload-zone:hover, .upload-zone.drag-over { border-color:#6366f1; background:#eef2ff; }
.upload-zone .icon { font-size:40px; margin-bottom:8px; }
.upload-zone .text { font-size:14px; color:#64748b; }
.upload-zone .sub { font-size:11px; color:#94a3b8; margin-top:4px; }
.upload-zone input[type=file] { display:none; }

.preview-original { display:none; width:100%; max-height:200px; object-fit:contain; border-radius:8px; border:1px solid #e0e0e0; }
.aspect-info { display:none; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:14px 16px; font-size:13px; color:#334155; line-height:1.6; }
.aspect-info.visible { display:block; }

.settings { display:flex; flex-direction:column; gap:8px; }
.btn-generate {
  width:100%; padding:12px; background:#6366f1; color:#fff; border:none; border-radius:10px;
  font-size:15px; font-weight:700; cursor:pointer; transition:all .15s;
}
.btn-generate:disabled { background:#c4b5fd; cursor:not-allowed; }
.btn-generate:not(:disabled):hover { background:#4f46e5; }

.right-panel {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
}
.result-header {
  display:none; align-items:center; justify-content:space-between; padding:12px 20px;
  background:#fff; border-bottom:1px solid #e0e0e0; flex-shrink:0;
}
.result-header.visible { display:flex; }
.result-header h2 { font-size:16px; font-weight:700; color:#1a1a2e; }
.result-header .btns { display:flex; align-items:center; gap:8px; }
.btn-zoom {
  padding:6px 12px; background:#f1f5f9; border:1px solid #cbd5e1; border-radius:8px;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .12s; min-width:42px;
}
.btn-zoom.active { background:#6366f1; color:#fff; border-color:#6366f1; }
.btn-copy {
  padding:6px 14px; background:#fff; border:1px solid #d0d0d0; border-radius:8px;
  font-size:12px; font-weight:600; cursor:pointer; margin-left:4px;
}
.zoom-slider {
  display:flex; align-items:center; gap:6px; font-size:11px; color:#64748b;
}
.zoom-slider input[type=range] { width:80px; }

.result-body {
  flex:1; overflow:auto; padding:16px 20px; display:flex; flex-direction:column; align-items:flex-start; gap:16px;
}
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#94a3b8; font-size:14px; padding:60px 20px; text-align:center;
  width:100%; flex:1;
}

.bead-container { display:none; }
.bead-container.visible { display:block; }
.bead-grid { display:flex; flex-direction:column; gap:0; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,.08); border-radius:4px; overflow:hidden; }
.bead-row { display:flex; gap:0; }
.bead-cell {
  position:relative; cursor:pointer; transition:transform .1s;
  box-sizing:border-box;
  border:1px solid rgba(0,0,0,.25);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.bead-cell .label {
  font-size:10px; font-weight:700; color:rgba(0,0,0,.55); line-height:1;
  text-shadow:0 0 2px rgba(255,255,255,.7); pointer-events:none;
  user-select:none; display:none;
}
.bead-cell .label.visible { display:block; }
.bead-cell:hover { transform:scale(1.8); z-index:5; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.bead-cell .tooltip {
  display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; font-size:10px; padding:3px 8px; border-radius:4px;
  white-space:nowrap; pointer-events:none; z-index:10;
}
.bead-cell:hover .tooltip { display:block; }

.bead-cell.board-edge-right { border-right:3px solid rgba(0,0,0,.5); }
.bead-cell.board-edge-bottom { border-bottom:3px solid rgba(0,0,0,.5); }

.inventory { display:none; }
.inventory.visible { display:block; width:100%; max-width:800px; }
.inventory h3 { font-size:15px; font-weight:700; color:#1a1a2e; margin-bottom:10px; }
.inventory-grid { display:flex; flex-wrap:wrap; gap:6px; }
.inventory-item {
  display:flex; align-items:center; gap:6px; background:#fff; border-radius:8px;
  padding:5px 10px; box-shadow:0 1px 3px rgba(0,0,0,.06); font-size:12px;
}
.inventory-swatch { width:20px; height:20px; border-radius:4px; border:1px solid #e0e0e0; flex-shrink:0; }
.inventory-count { font-weight:700; color:#6366f1; margin-left:2px; }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:999;
  background:#1e293b; color:#fff; padding:10px 24px; border-radius:20px; font-size:13px;
  box-shadow:0 4px 14px rgba(0,0,0,.2); opacity:0; transition:opacity .3s;
}
.toast.show { opacity:1; }

/* ========== DIY MODE STYLES ========== */
#diyMode { display:none; flex:1; flex-direction:column; overflow:hidden; }
#diyMode.active { display:flex; }
#converterContent { display:flex; flex:1; }
#converterContent.hidden { display:none; }

.diy-topbar {
  display:flex; align-items:center; justify-content:space-between; padding:10px 20px;
  background:#fff; border-bottom:1px solid #e0e0e0; flex-shrink:0; gap:12px;
}
.diy-topbar .diy-title { font-size:17px; font-weight:800; color:#1a1a2e; display:flex; align-items:center; gap:8px; }
.diy-topbar .diy-title .icon-diy { font-size:22px; }

.diy-board-config { display:flex; align-items:center; gap:10px; }
.diy-board-config label { font-size:13px; font-weight:600; color:#475569; white-space:nowrap; }
.diy-board-config select, .diy-board-config input {
  padding:5px 10px; border:1px solid #d0d0d0; border-radius:6px; font-size:13px;
}
.diy-board-config .diy-dims { display:flex; align-items:center; gap:4px; }
.diy-board-config .diy-dims input { width:44px; text-align:center; }

.diy-tools { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.diy-tool-btn {
  padding:6px 14px; border:1px solid #d0d0d0; border-radius:8px; font-size:12px; font-weight:600;
  cursor:pointer; background:#fff; transition:all .12s; white-space:nowrap;
}
.diy-tool-btn:hover { background:#f1f5f9; border-color:#94a3b8; }
.diy-tool-btn.primary { background:#6366f1; color:#fff; border-color:#6366f1; }
.diy-tool-btn.primary:hover { background:#4f46e5; }
.diy-tool-btn.danger { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
.diy-tool-btn.danger:hover { background:#fee2e2; }

.diy-main { display:flex; flex:1; overflow:hidden; }

.diy-palette-panel {
  width:320px; min-width:320px; background:#fff; border-right:1px solid #e0e0e0;
  display:flex; flex-direction:column; overflow:hidden;
}
.diy-palette-header {
  padding:12px 14px; border-bottom:1px solid #e0e0e0; font-size:14px; font-weight:700;
  color:#1a1a2e; display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.diy-selected-color {
  padding:10px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #e0e0e0;
}
.diy-selected-color .current-swatch {
  width:36px; height:36px; border-radius:8px; border:3px solid #6366f1; flex-shrink:0;
  box-shadow:0 0 0 2px #fff, 0 0 0 4px #6366f1;
}
.diy-selected-color .current-info { font-size:13px; font-weight:600; color:#334155; }
.diy-selected-color .current-hex { font-size:11px; color:#94a3b8; }

.diy-series-tabs {
  display:flex; flex-wrap:wrap; gap:4px; padding:8px 10px; flex-shrink:0;
  border-bottom:1px solid #e0e0e0; overflow-x:auto;
}
.diy-series-tab {
  padding:4px 10px; border-radius:14px; font-size:11px; font-weight:600; cursor:pointer;
  border:1px solid #e0e0e0; background:#f8fafc; white-space:nowrap; transition:all .12s;
}
.diy-series-tab:hover { background:#eef2ff; border-color:#a5b4fc; }
.diy-series-tab.active { background:#6366f1; color:#fff; border-color:#6366f1; }

.diy-palette-colors {
  flex:1; overflow-y:auto; padding:8px 10px; display:flex; flex-wrap:wrap;
  align-content:flex-start; gap:4px;
}
.diy-color-swatch {
  width:30px; height:30px; border-radius:4px; cursor:pointer; border:2px solid transparent;
  transition:all .1s; position:relative; flex-shrink:0;
}
.diy-color-swatch:hover { transform:scale(1.2); z-index:5; box-shadow:0 2px 6px rgba(0,0,0,.2); }
.diy-color-swatch.selected { border-color:#6366f1; box-shadow:0 0 0 2px #6366f1; transform:scale(1.1); z-index:4; }
.diy-color-swatch .swatch-tip {
  display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; font-size:10px; padding:2px 6px; border-radius:3px;
  white-space:nowrap; pointer-events:none; z-index:20;
}
.diy-color-swatch:hover .swatch-tip { display:block; }

.diy-erase-swatch {
  width:30px; height:30px; border-radius:4px; cursor:pointer; border:2px dashed #d0d0d0;
  background:repeating-linear-gradient(45deg,#fff,#fff 3px,#f1f5f9 3px,#f1f5f9 6px);
  display:flex; align-items:center; justify-content:center; font-size:12px; color:#94a3b8;
  flex-shrink:0;
}
.diy-erase-swatch:hover { border-color:#ef4444; color:#ef4444; }
.diy-erase-swatch.selected { border-color:#ef4444; box-shadow:0 0 0 2px #ef4444; }

.diy-canvas-area {
  flex:1; overflow:auto; padding:20px; display:flex; align-items:flex-start; justify-content:center;
  background:#e8ecf1;
}
.diy-canvas-area .diy-grid {
  display:flex; flex-direction:column; gap:0; box-shadow:0 4px 24px rgba(0,0,0,.1);
  border-radius:4px; overflow:hidden; background:#fff;
}
.diy-canvas-area .diy-grid .bead-row { display:flex; gap:0; }
.diy-canvas-area .diy-grid .bead-cell {
  position:relative; cursor:crosshair; transition:transform .08s;
  box-sizing:border-box;
  border:1px solid rgba(0,0,0,.15);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; background:#f9fafb;
}
.diy-canvas-area .diy-grid .bead-cell.filled { background:var(--cell-color); border-color:rgba(0,0,0,.25); }
.diy-canvas-area .diy-grid .bead-cell:hover { transform:scale(1.5); z-index:5; box-shadow:0 2px 8px rgba(0,0,0,.25); }
.diy-canvas-area .diy-grid .bead-cell .diy-cell-label {
  font-size:9px; font-weight:700; color:rgba(0,0,0,.5); line-height:1;
  text-shadow:0 0 2px rgba(255,255,255,.6); pointer-events:none;
  user-select:none; display:none;
}
.diy-canvas-area .diy-grid .bead-cell .diy-cell-tip {
  display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  background:#1e293b; color:#fff; font-size:10px; padding:3px 8px; border-radius:4px;
  white-space:nowrap; pointer-events:none; z-index:10;
}
.diy-canvas-area .diy-grid .bead-cell:hover .diy-cell-tip { display:block; }

.diy-board-label {
  position:absolute; font-size:10px; font-weight:700; color:rgba(0,0,0,.3);
  pointer-events:none; user-select:none;
}

/* Panel toggle for DIY */
.diy-inventory-panel {
  display:none; background:#fff; border-top:1px solid #e0e0e0; padding:12px 20px;
  max-height:140px; overflow-y:auto; flex-shrink:0;
}
.diy-inventory-panel.visible { display:block; }
.diy-inventory-panel h3 { font-size:13px; font-weight:700; color:#1a1a2e; margin-bottom:8px; }
.diy-inventory-panel .inventory-grid { display:flex; flex-wrap:wrap; gap:5px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>🧩 Mard 拼豆图案生成器 <span class="badge" id="beadBadge">221色库</span></h1>
  <div class="controls" id="converterControls">
    <label>单板规格</label>
    <select id="unitSize">
      <option value="14">14×14</option>
      <option value="29" selected>29×29</option>
      <option value="50">50×50</option>
      <option value="78">78×78</option>
    </select>
    <label>板数</label>
    <div class="board-dims">
      <input type="number" id="colsInput" value="1" min="1" max="50">
      <span class="sep">×</span>
      <input type="number" id="rowsInput" value="1" min="1" max="50">
    </div>
    <span class="board-info" id="boardInfo">--</span>
    <button class="btn-diy" id="btnDiy" title="进入DIY自由创作模式">🎨 DIY创作</button>
  </div>
  <button class="btn-converter" id="btnConverter" title="返回图案转换模式">📷 图案转换</button>
</div>

<div class="main-layout" id="mainLayout">
  <!-- ========== Converter Mode ========== -->
  <div id="converterContent" style="display:flex;flex:1;">
    <div class="left-panel" id="leftPanel">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📷</div>
        <div class="text">点击或拖拽上传图片</div>
        <div class="sub">支持 JPG / PNG / WebP</div>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <img class="preview-original" id="previewOriginal" alt="原图预览">
      <div class="aspect-info" id="aspectInfo">
        <div>📐 图片检测：<strong id="imgDims">--</strong></div>
        <div>🎯 建议拼板：<strong id="suggestedLayout">--</strong></div>
        <div style="font-size:11px;color:#64748b;margin-top:4px;">可手动调整顶部「板数」列×行</div>
      </div>
      <div class="settings">
        <button class="btn-generate" id="btnGenerate" disabled>🎨 生成拼豆图案</button>
      </div>
    </div>
    <div class="right-panel">
      <div class="result-header" id="resultHeader">
        <h2 id="resultTitle">拼豆图案</h2>
        <div class="btns">
          <div class="zoom-slider">
            <span>🔍</span>
            <input type="range" id="zoomSlider" min="0.2" max="5" step="0.1" value="1">
            <span id="zoomLabel">1×</span>
          </div>
          <button class="btn-zoom active" data-zoom="1">1×</button>
          <button class="btn-zoom" data-zoom="2">2×</button>
          <button class="btn-zoom" data-zoom="3">3×</button>
          <button class="btn-copy">📋 复制清单</button>
        </div>
      </div>
      <div class="result-body" id="resultBody">
        <div class="empty-state" id="emptyState">
          <div style="font-size:48px;margin-bottom:12px;">🎯</div>
          <div>上传图片，选择拼豆板规格与列×行板数，点击生成</div>
        </div>
        <div class="bead-container" id="beadContainer">
          <div class="bead-grid" id="beadGrid"></div>
        </div>
        <div class="inventory" id="inventory">
          <h3>📊 色号用量清单</h3>
          <div class="inventory-grid" id="inventoryGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== DIY Mode ========== -->
  <div id="diyMode">
    <div class="diy-topbar">
      <div class="diy-title">
        <span class="icon-diy">✨</span> DIY 自由创作
      </div>
      <div class="diy-board-config">
        <label>单板规格</label>
        <select id="diyUnitSize">
          <option value="14">14×14</option>
          <option value="29" selected>29×29</option>
          <option value="50">50×50</option>
          <option value="78">78×78</option>
        </select>
        <label>板数</label>
        <div class="diy-dims">
          <input type="number" id="diyColsInput" value="1" min="1" max="20">
          <span class="sep">×</span>
          <input type="number" id="diyRowsInput" value="1" min="1" max="20">
        </div>
        <button class="diy-tool-btn primary" id="diyBtnCreate">📐 建板</button>
      </div>
      <div class="diy-tools">
        <button class="diy-tool-btn danger" id="diyBtnClear">🗑️ 清空</button>
        <button class="diy-tool-btn" id="diyBtnUndo">↩️ 撤销</button>
        <button class="diy-tool-btn" id="diyBtnToggleInv">📊 用量</button>
        <button class="diy-tool-btn primary" id="diyBtnCopyList">📋 复制清单</button>
        <button class="diy-tool-btn" id="diyBtnExport">💾 导出图片</button>
      </div>
    </div>
    <div class="diy-main">
      <div class="diy-palette-panel">
        <div class="diy-palette-header">🎨 色号调色板</div>
        <div class="diy-selected-color">
          <div class="current-swatch" id="diyCurrentSwatch" style="background:#f9fafb;"></div>
          <div>
            <div class="current-info" id="diyCurrentName">未选择</div>
            <div class="current-hex" id="diyCurrentHex">点击色块选取</div>
          </div>
        </div>
        <div class="diy-series-tabs" id="diySeriesTabs"></div>
        <div class="diy-palette-colors" id="diyPaletteColors">
          <div class="diy-erase-swatch" id="diyEraseSwatch" title="橡皮擦">✕</div>
        </div>
      </div>
      <div class="diy-canvas-area" id="diyCanvasArea">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:15px;">
          <div style="font-size:56px;margin-bottom:16px;">✨</div>
          <div>请先设置板规格，点击「📐 建板」开始创作</div>
          <div style="font-size:12px;margin-top:8px;">选择色号后点击格子放置拼豆，右键擦除</div>
        </div>
      </div>
    </div>
    <div class="diy-inventory-panel" id="diyInventoryPanel">
      <h3>📊 色号用量清单</h3>
      <div class="inventory-grid" id="diyInventoryGrid"></div>
    </div>
  </div>
</div>

var imgAspectRatio = 1;

var uploadZone = document.getElementById('uploadZone');

var colsInput = document.getElementById('colsInput');

var unitSizeSelect = document.getElementById('unitSize');

var zoomLabel = document.getElementById('zoomLabel');

uploadZone.addEventListener('click', function(){ fileInput.click(); });

uploadZone.addEventListener('dragleave', function(){ uploadZone.classList.remove('drag-over'); });
uploadZone.addEventListener('drop', function(e){
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      uploadedImage = img;
      imgAspectRatio = img.width / img.height;
      document.getElementById('previewOriginal').src = ev.target.result;
      document.getElementById('previewOriginal').style.display = 'block';
      document.getElementById('imgDims').textContent = img.width+'×'+img.height+' (宽高比 '+imgAspectRatio.toFixed(2)+':1)';
      suggestLayout();
      updateInfo();
      document.getElementById('btnGenerate').disabled = false;
      document.getElementById('btnGenerate').textContent = getGenerateLabel();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function getGenerateLabel() {
  var unit = parseInt(unitSizeSelect.value);
  var cols = parseInt(colsInput.value) || 1;
  var rows = parseInt(rowsInput.value) || 1;
  return '🎨 生成 '+(cols*unit)+'×'+(rows*unit)+' 拼豆图案';
}

function suggestLayout() {
  if (!uploadedImage) return;
  var unit = parseInt(unitSizeSelect.value);
  var targetAspect = imgAspectRatio;
  var bestErr = Infinity, bestCols = 1, bestRows = 1;
  var maxSide = 30;
  for (var c = 1; c <= maxSide; c++) {
    for (var r = 1; r <= maxSide; r++) {
      var err = Math.abs(c/r - targetAspect);
      if (err < bestErr - 0.001 || (Math.abs(err - bestErr) < 0.001 && c*r < bestCols*bestRows)) {
        bestErr = err; bestCols = c; bestRows = r;
      }
    }
  }
  colsInput.value = bestCols;
  rowsInput.value = bestRows;
  document.getElementById('suggestedLayout').textContent =
    bestCols+'×'+bestRows+' 块（'+unit+'×'+unit+'单板） → '+ (bestCols*unit)+'×'+(bestRows*unit)+' 豆';
  document.getElementById('aspectInfo').classList.add('visible');
}

function updateInfo() {
  var unit = parseInt(unitSizeSelect.value);
  var cols = parseInt(colsInput.value) || 1;
  var rows = parseInt(rowsInput.value) || 1;
  var totalBeads = cols * unit * rows * unit;
  var totalBoards = cols * rows;
  document.getElementById('boardInfo').textContent =
    '总 '+cols+'×'+rows+'='+totalBoards+'块板, '+(cols*unit)+'×'+(rows*unit)+'='+totalBeads.toLocaleString()+'豆';
  if (uploadedImage) {
    document.getElementById('btnGenerate').textContent = getGenerateLabel();
  }
}

unitSizeSelect.addEventListener('change', function() {

  updateInfo();
});

function findClosest(r, g, b) {
  var best = null, bestDist = Infinity;
  for (var i = 0; i < colorCache.length; i++) {
    var c = colorCache[i];
    var dr = r - c.r, dg = g - c.g, db = b - c.b;
    var dist = dr*dr + dg*dg + db*db;
    if (dist < bestDist) { bestDist = dist; best = c; }
  }
  return best;
}

function generateBead() {
  if (!uploadedImage) return;
  var unit = parseInt(unitSizeSelect.value);
  var cols = parseInt(colsInput.value) || 1;
  var rows = parseInt(rowsInput.value) || 1;
  var totalW = cols * unit;
  var totalH = rows * unit;

  var canvas = document.createElement('canvas');
  canvas.width = totalW;
  canvas.height = totalH;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(uploadedImage, 0, 0, totalW, totalH);

  var imageData = ctx.getImageData(0, 0, totalW, totalH);
  var pixels = imageData.data;

  var beadMap = [];
  var invMap = {};
  for (var y = 0; y < totalH; y++) {
    var row = [];
    for (var x = 0; x < totalW; x++) {
      var idx = (y * totalW + x) * 4;
      var r = pixels[idx], g = pixels[idx+1], b = pixels[idx+2];
      var match = findClosest(r, g, b);
      row.push(match);
      var key = match.name;
      if (!invMap[key]) invMap[key] = { color:match, count:0 };
      invMap[key].count++;
    }
    beadMap.push(row);
  }
  renderBeadGrid(beadMap, totalW, totalH, unit);
  renderInventory(invMap, totalW, totalH);
  document.getElementById('beadBadge').textContent = totalW+'×'+totalH+'='+(totalW*totalH).toLocaleString()+'豆';
}

function renderBeadGrid(beadMap, totalW, totalH, unit) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('beadContainer').classList.add('visible');
  document.getElementById('resultHeader').classList.add('visible');

  var maxDim = Math.max(totalW, totalH);
  var baseSize = Math.max(4, Math.floor(600 / maxDim));
  var cellSize = Math.round(currentZoom * baseSize);
  if (cellSize < 2) cellSize = 2;

  var grid = document.getElementById('beadGrid');
  grid.style.width = (cellSize * totalW) + 'px';

  var showLabel = cellSize >= 14;

  grid.innerHTML = '';
  for (var y = 0; y < totalH; y++) {
    var rowDiv = document.createElement('div');
    rowDiv.className = 'bead-row';
    rowDiv.style.height = cellSize + 'px';
    for (var x = 0; x < totalW; x++) {
      var c = beadMap[y][x];
      var cell = document.createElement('div');
      cell.className = 'bead-cell';
      if ((x + 1) % unit === 0 && x < totalW - 1) cell.classList.add('board-edge-right');
      if ((y + 1) % unit === 0 && y < totalH - 1) cell.classList.add('board-edge-bottom');
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.style.background = c.hex;
      cell.title = c.name + ' ' + c.hex;
      var tip = document.createElement('span');
      tip.className = 'tooltip';
      tip.textContent = c.name + ' ' + c.hex;
      cell.appendChild(tip);
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = c.name;
      if (showLabel) label.classList.add('visible');
      cell.appendChild(label);
      rowDiv.appendChild(cell);
    }
    grid.appendChild(rowDiv);
  }
}

function renderInventory(invMap, totalW, totalH) {
  var items = [];
  for (var k in invMap) items.push(invMap[k]);
  items.sort(function(a,b){ return b.count - a.count; });
  var html = '';

// Init DIY palette
function initDiyPalette() {
  // Series tabs
  var tabsHtml = '<div class="diy-series-tab active" data-series="all">全部</div>';

  // Tab clicks
  document.querySelectorAll('#diySeriesTabs .diy-series-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('#diySeriesTabs .diy-series-tab').forEach(function(t){ t.classList.remove('active'); });

  });

function renderDiyPaletteColors(seriesFilter) {
  var paletteDiv = document.getElementById('diyPaletteColors');
  // Keep erase swatch, clear rest
  var eraseEl = paletteDiv.querySelector('.diy-erase-swatch');
  paletteDiv.innerHTML = '';
  if (eraseEl) paletteDiv.appendChild(eraseEl);
  else {
    var ers = document.createElement('div');
    ers.className = 'diy-erase-swatch';
    ers.id = 'diyEraseSwatch';
    ers.title = '橡皮擦（右键也可擦除）';
    ers.textContent = '✕';
    ers.addEventListener('click', function(){ selectDiyColor(null); });
    paletteDiv.appendChild(ers);
  }

  for (var i = 0; i < colorCache.length; i++) {
    var cc = colorCache[i];
    if (seriesFilter !== 'all' && cc.series !== seriesFilter) continue;
    var sw = document.createElement('div');
    sw.className = 'diy-color-swatch';
    sw.style.background = cc.hex;
    sw.title = cc.name + ' ' + cc.hex;
    sw.setAttribute('data-color-name', cc.name);
    sw.setAttribute('data-color-hex', cc.hex);
    if (diySelectedColor && diySelectedColor.name === cc.name) sw.classList.add('selected');

    var tip = document.createElement('span');
    tip.className = 'swatch-tip';
    tip.textContent = cc.name;
    sw.appendChild(tip);

    sw.addEventListener('click', function(e){
      var cName = this.getAttribute('data-color-name');
      var cHex = this.getAttribute('data-color-hex');
      var found = null;
      for (var j = 0; j < colorCache.length; j++) {
        if (colorCache[j].name === cName) { found = colorCache[j]; break; }
      }
      selectDiyColor(found);
    });
    paletteDiv.appendChild(sw);
  }
}

function selectDiyColor(color) {
  diySelectedColor = color;
  document.getElementById('diyCurrentSwatch').style.background = color ? color.hex : '#f9fafb';
  document.getElementById('diyCurrentName').textContent = color ? color.name : '橡皮擦';
  document.getElementById('diyCurrentHex').textContent = color ? color.hex : '右键点击格子也可擦除';

  // Update selection visual
  document.querySelectorAll('#diyPaletteColors .diy-color-swatch').forEach(function(s){
    s.classList.remove('selected');
    if (color && s.getAttribute('data-color-name') === color.name) s.classList.add('selected');
  });
  var eraseSw = document.getElementById('diyEraseSwatch');
  if (eraseSw) {
    eraseSw.classList.remove('selected');
    if (!color) eraseSw.classList.add('selected');
  }

  // Reset series filter highlight
  document.querySelectorAll('#diySeriesTabs .diy-series-tab').forEach(function(t){ t.classList.remove('active'); });
  var allTab = document.querySelector('#diySeriesTabs .diy-series-tab[data-series="all"]');
  if (allTab) allTab.classList.add('active');
  diyCurrentSeries = 'all';
}

function renderDiyGrid() {
  var canvasArea = document.getElementById('diyCanvasArea');
  if (diyGridW === 0 || diyGridH === 0) {
    canvasArea.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:15px;"><div style="font-size:56px;margin-bottom:16px;">✨</div><div>请先设置板规格，点击「📐 建板」开始创作</div><div style="font-size:12px;margin-top:8px;">选择色号后点击格子放置拼豆，右键擦除</div></div>';
    return;
  }

  var maxDim = Math.max(diyGridW, diyGridH);
  var baseSize = Math.max(6, Math.floor(700 / maxDim));
  var cellSize = baseSize;
  if (cellSize < 4) cellSize = 4;

  var html = '<div class="diy-grid" style="width:'+(cellSize*diyGridW)+'px;">';
  for (var y = 0; y < diyGridH; y++) {
    html += '<div class="bead-row" style="height:'+cellSize+'px;">';
    for (var x = 0; x < diyGridW; x++) {
      var cc = diyGridData[y][x];
      var bg = cc ? cc.hex : '#f9fafb';
      var cls = 'bead-cell';
      if (cc) cls += ' filled';
      if ((x + 1) % diyUnit === 0 && x < diyGridW - 1) cls += ' board-edge-right';
      if ((y + 1) % diyUnit === 0 && y < diyGridH - 1) cls += ' board-edge-bottom';
      html += '<div class="'+cls+'" style="width:'+cellSize+'px;height:'+cellSize+'px;'+(cc?'--cell-color:'+cc.hex+';':'')+'background:'+bg+';" data-x="'+x+'" data-y="'+y+'">';
      if (cc) {
        html += '<span class="diy-cell-tip">'+cc.name+' '+cc.hex+'</span>';
        if (cellSize >= 14) {
          html += '<span class="diy-cell-label" style="display:block;">'+cc.name+'</span>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  canvasArea.innerHTML = html;

  // Attach event listeners to cells
  var cells = canvasArea.querySelectorAll('.diy-grid .bead-cell');
  cells.forEach(function(cell){
    cell.addEventListener('mousedown', function(e){
      e.preventDefault();
      diyIsMouseDown = true;
      if (e.button === 2) {
        // Right click: erase
        var x = parseInt(this.getAttribute('data-x'));
        var y = parseInt(this.getAttribute('data-y'));
        paintDiyCell(x, y, null);
      } else if (e.button === 0) {
        // Left click: paint
        var x = parseInt(this.getAttribute('data-x'));
        var y = parseInt(this.getAttribute('data-y'));
        paintDiyCell(x, y, diySelectedColor);
      }
    });
    cell.addEventListener('mouseenter', function(e){
      if (!diyIsMouseDown) return;
      var x = parseInt(this.getAttribute('data-x'));
      var y = parseInt(this.getAttribute('data-y'));
      if (e.buttons === 2) {
        paintDiyCell(x, y, null);
      } else if (e.buttons === 1) {
        paintDiyCell(x, y, diySelectedColor);
      }
    });
    cell.addEventListener('contextmenu', function(e){
      e.preventDefault();
      var x = parseInt(this.getAttribute('data-x'));
      var y = parseInt(this.getAttribute('data-y'));
      paintDiyCell(x, y, null);
    });
  });

  // Global mouseup
  document.addEventListener('mouseup', function(){
    diyIsMouseDown = false;
  });
}

function paintDiyCell(x, y, color) {
  if (x < 0 || x >= diyGridW || y < 0 || y >= diyGridH) return;
  var old = diyGridData[y][x];
  // Don't repaint if same color
  if (old === color) return;
  if (old && color && old.name === color.name) return;

  // Save to undo stack (store as snapshot of this cell)
  diyUndoStack.push({ x: x, y: y, old: old, color: color });
  if (diyUndoStack.length > 500) diyUndoStack.shift(); // limit undo stack

  diyGridData[y][x] = color;

  // Update cell visually
  var cellEl = document.querySelector('#diyCanvasArea .diy-grid .bead-cell[data-x="'+x+'"][data-y="'+y+'"]');
  if (cellEl) {
    var bg = color ? color.hex : '#f9fafb';
    cellEl.style.background = bg;
    if (color) {
      cellEl.classList.add('filled');
      cellEl.style.setProperty('--cell-color', color.hex);
      // Update tooltip
      var existingTip = cellEl.querySelector('.diy-cell-tip');
      if (existingTip) existingTip.textContent = color.name + ' ' + color.hex;
      else {
        var tip = document.createElement('span');
        tip.className = 'diy-cell-tip';
        tip.textContent = color.name + ' ' + color.hex;
        cellEl.appendChild(tip);
      }
      // Update label
      var existingLabel = cellEl.querySelector('.diy-cell-label');
      if (!existingLabel) {
        var label = document.createElement('span');
        label.className = 'diy-cell-label';
        cellEl.appendChild(label);
        existingLabel = label;
      }
      var cellSize = parseInt(cellEl.style.width);
      if (cellSize >= 14) {
        existingLabel.style.display = 'block';
        existingLabel.textContent = color.name;
      } else {
        existingLabel.style.display = 'none';
      }
    } else {
      cellEl.classList.remove('filled');
      cellEl.style.removeProperty('--cell-color');
      var tip = cellEl.querySelector('.diy-cell-tip');
      if (tip) tip.remove();
      var label = cellEl.querySelector('.diy-cell-label');
      if (label) label.remove();
    }
  }

  updateDiyInventory();
}

function updateDiyInventory() {
  if (diyGridW === 0) return;
  var invMap = {};
  for (var y = 0; y < diyGridH; y++) {
    for (var x = 0; x < diyGridW; x++) {
      var cc = diyGridData[y][x];
      if (!cc) continue;
      var key = cc.name;
      if (!invMap[key]) invMap[key] = { color: cc, count: 0 };
      invMap[key].count++;
    }
  }
  var items = [];
  for (var k in invMap) items.push(invMap[k]);
  items.sort(function(a,b){ return b.count - a.count; });

  var totalUsed = 0;
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    totalUsed += it.count;
    html += '<div class="inventory-item">';
    html += '<div class="inventory-swatch" style="background:'+it.color.hex+';"></div>';
    html += '<span>'+it.color.name+'</span>';
    html += '<span class="inventory-count">×'+it.count+'</span>';
    html += '<span style="color:#94a3b8;font-size:10px;">'+it.color.hex+'</span>';
    html += '</div>';
  }
  document.getElementById('diyInventoryGrid').innerHTML = html || '<span style="font-size:12px;color:#94a3b8;">暂无拼豆放置</span>';

  var cols = parseInt(document.getElementById('diyColsInput').value) || 1;
  var rows = parseInt(document.getElementById('diyRowsInput').value) || 1;
  var totalBoards = cols * rows;
  document.getElementById('beadBadge').textContent = 'DIY: '+diyGridW+'×'+diyGridH+' ('+items.length+'色, '+totalUsed+'豆, '+totalBoards+'块板)';
}

  var items = [];
  for (var k in invMap) items.push(invMap[k]);
  items.sort(function(a,b){ return b.count - a.count; });
  var text = '';
  for (var i = 0; i < items.length; i++) {
    text += items[i].color.name + ' ×' + items[i].count + ' ' + items[i].color.hex + '\n';
  }
  navigator.clipboard.writeText(text).then(function(){
    showToast('✅ DIY清单已复制到剪贴板');
  });
});

// Export as image
document.getElementById('diyBtnExport').addEventListener('click', function(){
  if (diyGridW === 0) { showToast('请先创建画板'); return; }
  var cellSize = 12;
  var canvas = document.createElement('canvas');
  canvas.width = diyGridW * cellSize;
  canvas.height = diyGridH * cellSize;
  var ctx = canvas.getContext('2d');
  for (var y = 0; y < diyGridH; y++) {
    for (var x = 0; x < diyGridW; x++) {
      var cc = diyGridData[y][x];
      ctx.fillStyle = cc ? cc.hex : '#ffffff';
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
      // Board edge lines
      if ((x + 1) % diyUnit === 0 && x < diyGridW - 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect((x+1) * cellSize - 1, y * cellSize, 2, cellSize);
      }
      if ((y + 1) % diyUnit === 0 && y < diyGridH - 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(x * cellSize, (y+1) * cellSize - 1, cellSize, 2);
      }
    }
  }
  var link = document.createElement('a');
  link.download = 'diy_bead_design.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('💾 图片已导出');
});

// Init converter
updateInfo();
</script>
